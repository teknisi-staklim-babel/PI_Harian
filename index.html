// kategori + warna
function getKategori(val) {
    if (val < 0.5) return ["Tidak ada hujan", "#cccccc"];
    if (val <= 20) return ["Ringan", "#00ff00"];
    if (val <= 50) return ["Sedang", "#ffff00"];
    if (val <= 100) return ["Lebat", "#ffa500"];
    if (val <= 150) return ["Sangat Lebat", "#ff0000"];
    return ["Ekstrem", "#ff00ff"];
}

const kabList = [...new Set(dataGlobal.map(d => d.kabupaten).filter(Boolean))];

const select = document.getElementById("filterKab");

// default option
let defaultOpt = document.createElement("option");
defaultOpt.value = "";
defaultOpt.innerText = "Pilih Kabupaten";
defaultOpt.selected = true;
defaultOpt.disabled = true;
select.appendChild(defaultOpt);

// isi dropdown
kabList.forEach(kab => {
    let opt = document.createElement("option");
    opt.value = kab;
    opt.innerText = kab;
    select.appendChild(opt);
});

// inisialisasi chart kosong
let chart = new Chart(document.getElementById("chartCH"), {
    type: "bar",
    data: {
        labels: [],
        datasets: [{
            label: "Curah Hujan (mm)",
            data: []
        }]
    },
    options: {
        responsive: true
    }
});

function renderChart(kabupaten) {

    document.getElementById("infoText").style.display = "none";

    let filtered = dataGlobal.filter(d => d.kabupaten === kabupaten);

    filtered.sort((a,b) => b.CH - a.CH);

    const labels = filtered.map(d => d.LOKASI);
    const values = filtered.map(d => d.CH);
    const colors = values.map(v => getKategori(v)[1]);

    chart.destroy();

    chart = new Chart(document.getElementById("chartCH"), {
        type: "bar",
        data: {
            labels: labels,
            datasets: [{
                label: "Curah Hujan (mm)",
                data: values,
                backgroundColor: colors
            }]
        },
        options: {
            responsive: true,
            plugins: {
                tooltip: {
                    callbacks: {
                        label: function(context) {
                            let val = context.raw;
                            let kategori = getKategori(val)[0];
                            return context.label + ": " + val + " mm (" + kategori + ")";
                        }
                    }
                },
                legend: {
                    display: false
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    title: {
                        display: true,
                        text: "Curah Hujan (mm)"
                    }
                }
            }
        }
    });
}

// event dropdown (FIX: hanya 1 event)
select.addEventListener("change", function() {
    if (this.value !== "") {
        renderChart(this.value);
    }
});
</script>
